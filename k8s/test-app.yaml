apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-test
  template:
    metadata:
      labels:
        app: security-test
    spec:
      containers:
      - name: web
        image: nginxdemos/hello:plain-text # 테스트용 가벼운 이미지
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: security-test-svc
spec:
  selector:
    app: security-test
  ports:
  - port: 80
    targetPort: 80
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-app-ingress
  annotations:
    # 1. ModSecurity 엔진을 명시적으로 활성화
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    # 2. 실시간 차단 모드(On) 설정 및 커스텀 룰 주입
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecRule ARGS:data "@contains ho-seok-attack" "id:10005,phase:2,deny,status:403,msg:'Hoseok Custom Block'"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-app-service
            port:
              number: 80
