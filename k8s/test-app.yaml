apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-test
  template:
    metadata:
      labels:
        app: security-test
    spec:
      containers:
      - name: web
        image: nginxdemos/hello:plain-text # 테스트용 가벼운 이미지
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: security-test-svc
spec:
  selector:
    app: security-test
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: security-test-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: security-test-svc
            port:
              number: 80
