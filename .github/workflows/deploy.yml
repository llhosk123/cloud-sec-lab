name: deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: hashicorp/setup-terraform@v3

    - name: AWS login
      run: |
        aws configure set aws_access_key_id ${{ secrets.AWS_KEY }}
        aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET }}
        aws configure set region ap-northeast-2

    - name: terraform
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve \
          -var="key_name=${{ secrets.KEY_NAME }}" \
          -var="existing_sg_id=${{ github.event.inputs.existing_sg_id }}"

    - name: get ip
      run: |
        cd terraform
        # output 이름이 public_ip로 설정되어 있어야 합니다.
        terraform output -raw public_ip > ../ip.txt

    - name: install ansible
      run: |
        sudo apt update
        sudo apt install -y ansible

    - name: setup ansible environment
      run: |
        IP=$(cat ip.txt)
        # 1. key.pem을 ansible 폴더 안에 생성 (경로 단순화)
        echo "${{ secrets.SSH_KEY }}" > ansible/key.pem
        chmod 600 ansible/key.pem
        
        # 2. inventory.ini 생성 (ansible/key.pem을 가리키도록)
        echo "[server]" > ansible/inventory.ini
        echo "$IP ansible_user=ubuntu ansible_ssh_private_key_file=key.pem" >> ansible/inventory.ini

    - name: ansible run
      run: |
        # 중요: ansible 폴더로 들어가서 실행해야 ansible.cfg를 읽습니다.
        cd ansible
        ansible-playbook -i inventory.ini playbook.yml
