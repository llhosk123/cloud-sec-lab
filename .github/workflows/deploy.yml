name: deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: AWS login
      run: |
        aws configure set aws_access_key_id ${{ secrets.AWS_KEY }}
        aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET }}
        aws configure set region ap-northeast-2

    - name: Terraform Apply
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve -var="key_name=${{ secrets.KEY_NAME }}"

    - name: Get IPs and Export to GitHub Env
      run: |
        cd terraform
        # 파일을 생성함과 동시에 GitHub 전역 환경 변수로 등록 (가장 안전한 방식)
        SERVER_IP=$(terraform output -raw server_ip)
        IDS_IP=$(terraform output -raw ids_ip)
        KAFKA_IP=$(terraform output -raw kafka_ip)
        
        echo "SERVER_IP=$SERVER_IP" >> $GITHUB_ENV
        echo "IDS_IP=$IDS_IP" >> $GITHUB_ENV
        echo "KAFKA_IP=$KAFKA_IP" >> $GITHUB_ENV
        
        # 파일로도 저장 (혹시 모를 참조용)
        echo "$SERVER_IP" > ../server_ip.txt
        echo "$IDS_IP" > ../ids_ip.txt
        echo "$KAFKA_IP" > ../kafka_ip.txt

    - name: Install Ansible
      run: |
        sudo apt update
        sudo apt install -y ansible

    - name: Setup Ansible Inventory
      run: |
        # SSH 키 생성
        echo "${{ secrets.SSH_KEY }}" > key.pem
        chmod 600 key.pem

        # 인벤토리 파일 생성 (환경 변수 사용)
        mkdir -p ansible
        cat <<EOF > ansible/inventory.ini
        [server]
        server_node ansible_host=${{ env.SERVER_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=../key.pem

        [ids]
        ids_node ansible_host=${{ env.IDS_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=../key.pem

        [kafka]
        kafka_node ansible_host=${{ env.KAFKA_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=../key.pem
        EOF

    - name: Ansible Run (Full Deployment)
      run: |
        export ANSIBLE_HOST_KEY_CHECKING=False
        
        # 1. 기존 WAF/IDS 설치
        ansible-playbook -i ansible/inventory.ini ansible/playbook.yml

        # 2. Kafka 설치 (Docker-compose)
        ansible-playbook -i ansible/inventory.ini ansible/kafka_setup.yml

        # 3. Fluent Bit 설치 (Kafka IP 전달)
        ansible-playbook -i ansible/inventory.ini ansible/fluent_bit_setup.yml \
          -e "kafka_broker_ip=${{ env.KAFKA_IP }}"

    - name: Deploy Test App to K3s
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ env.SERVER_IP }} \
          "sudo k3s kubectl apply -f -" < k8s/test-app.yaml
