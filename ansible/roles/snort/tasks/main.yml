---
- name: 1. Snort 패키지 설치
  apt:
    name: snort
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

# 💡 [추가됨] 권한 충돌을 일으키는 좀비 프로세스와 쓰레기 파일 강제 청소
- name: 2. [복구] 기존 꼬인 프로세스 및 파일 강제 정리 (Clean Up)
  shell: |
    pkill -9 snort || true
    rm -f /var/log/snort/*
  failed_when: false

- name: 3. 인터페이스 이름 자동 감지
  set_fact:
    ansible_interface_name: "{{ ansible_default_ipv4.interface }}"

- name: 4. Snort 기본 설정 파일(/etc/default/snort)에 인터페이스 지정
  lineinfile:
    path: /etc/default/snort
    regexp: '^INTERFACE='
    line: 'INTERFACE="{{ ansible_interface_name }}"'
  register: default_config

- name: 5. snort.conf에 alert_full 출력 설정 추가
  lineinfile:
    path: /etc/snort/snort.conf
    line: 'output alert_full: snort.alert'
    insertafter: EOF
    state: present
  register: snort_conf

- name: 6. 로그 디렉토리 및 내부 파일 권한 강제 설정 (소유권 문제 해결)
  file:
    path: /var/log/snort
    state: directory
    owner: snort
    group: snort
    mode: '0700'
    recurse: yes

- name: 7. Snort 커스텀 룰 배포 (템플릿 방식)
  template:
    src: snort.rules.j2
    dest: /etc/snort/rules/local.rules
  register: rule_update

# 💡 [수정됨] 변수명 오타(config_updated -> snort_conf) 수정
- name: 8. Snort 룰 문법 검사
  shell: "snort -T -c /etc/snort/snort.conf"
  when: rule_update.changed or snort_conf.changed

- name: 9. 현재 Snort 프로세스 확인
  shell: pgrep snort
  register: snort_status
  ignore_errors: yes
  changed_when: false

- name: 10. Snort 서비스 재시작 (systemctl restart)
  systemd:
    name: snort
    state: restarted
    enabled: yes
  when: rule_update.changed or snort_conf.changed or default_config.changed

- name: 11. IPS 스크립트 디렉토리 생성
  file:
    path: /home/ubuntu/ips
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: 12. ips_deny.sh 스크립트 배포
  copy:
    dest: /home/ubuntu/ips/ips_deny.sh
    owner: ubuntu
    group: ubuntu
    mode: '0755'
    content: |
      #!/bin/bash
      LOGFILE="/var/log/snort/snort.alert.fast"
      EXCLUDE_IPS=("192.168.100.20" "52.78.76.224" "192.168.110.229" "192.168.110.215" "192.168.110.40" "192.168.110.10" "192.168.100.10" "43.202.237.187" "192.168.120.10" "127.0.0.1" "124.58.76.122" "180.224.83.39" "211.243.114.16" "59.16.17.51" "218.155.95.111" "211.195.111.228" "218.147.184.245")

      echo "------------------------------------------------"
      echo "  [침입 차단 시스템 가동 중] (실시간 조회 모드)"
      echo "------------------------------------------------"

      # 💡 [추가됨] Snort가 켜지고 파일을 만들 때까지 대기 (tail 에러 방지)
      until [ -f "$LOGFILE" ]; do sleep 1; done

      stdbuf -oL tail -n 100 -F "$LOGFILE" | while read line; do
          if echo "$line" | grep -qi "DROP"; then
              REASON=$(echo "$line" | awk -F'\\[\\*\\*\\]' '{print $2}' | xargs)
              IP=$(echo "$line" | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -n 1)

              if [ -n "$IP" ]; then
                  # 1. 관리자 IP 예외 처리
                  IS_ADMIN=false
                  for admin_ip in "${EXCLUDE_IPS[@]}"; do
                      if [ "$IP" == "$admin_ip" ]; then
                          IS_ADMIN=true
                          break
                      fi
                  done

                  if [ "$IS_ADMIN" = true ]; then
                      echo "⚠️  [제외] 관리자 IP 감지: $IP"
                      echo "      => 탐지명: $REASON"
                      echo "------------------------------------------------"

                  # 2. iptables에 해당 IP가 이미 차단되어 있는지 확인 (-C 옵션)
                  elif sudo iptables -C INPUT -s "$IP" -j DROP 2>/dev/null; then
                      echo "ℹ️  [중복] 이미 차단된 IP입니다: $IP"
                      echo "      => 탐지명: $REASON"
                      echo "      => 조치: 추가 차단 생략"
                      echo "------------------------------------------------"
                  
                  # 3. 중복되지 않은 경우 신규 차단 실행
                  else
                      sudo iptables -I INPUT -s "$IP" -j DROP
                      echo "🚫 [차단] 신규 공격 IP 감지: $IP"
                      echo "      => 탐지명: $REASON"
                      echo "      => 조치: iptables DROP 등록 완료"
                      echo "------------------------------------------------"
                  fi
              fi
          fi
      done