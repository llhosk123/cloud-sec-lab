---
- name: Install Snort
  apt:
    name: snort
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: 인터페이스 이름 자동 감지
  set_fact:
    ansible_interface_name: "{{ ansible_default_ipv4.interface }}"

- name: Snort 커스텀 룰 배포 (템플릿 방식)
  template:
    src: snort.rules.j2
    dest: /etc/snort/rules/local.rules
  register: rule_update

- name: Snort 룰 문법 검사 (오타 있으면 배포 중단)
  shell: "snort -T -c /etc/snort/snort.conf"
  when: rule_update.changed

- name: 로그 디렉토리 권한 설정
  file:
    path: /var/log/snort
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: 현재 Snort 프로세스 실행 여부 확인
  shell: pgrep snort
  register: snort_status
  ignore_errors: yes
  changed_when: false

- name: Snort 실행/재시작 (Kafka 전송용 로깅 포함)
  shell: |
    pkill snort || true
    nohup snort -q -A fast -c /etc/snort/snort.conf -i {{ ansible_interface_name }} -l /var/log/snort > /dev/null 2>&1 &
  when: rule_update.changed or snort_status.rc != 0

- name: Create directory for IPS script
  file:
    path: /home/ubuntu/ips
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Deploy ips_deny.sh script (실시간 차단 스크립트)
  copy:
    dest: /home/ubuntu/ips/ips_deny.sh
    owner: ubuntu
    group: ubuntu
    mode: '0755'
    content: |
      #!/bin/bash
      BLOCKED_IPS="/home/ubuntu/ips/blocked_ips.txt"
      touch "$BLOCKED_IPS"
      LOGFILE="/var/log/snort/snort.alert.fast"
      EXCLUDE_IPS=("192.168.100.20" "52.78.76.224" "192.168.110.229" "192.168.110.215" "192.168.110.40" "192.168.110.10" "192.168.100.10" "43.202.237.187" "192.168.120.10" "127.0.0.1" "124.58.76.122" "180.224.83.39" "211.243.114.16" "59.16.17.51" "218.155.95.111" "211.195.111.228" "218.147.184.245")

      echo "------------------------------------------------"
      echo "  [침입 차단 시스템 가동 중]  (키워드: [DROP])"
      echo "------------------------------------------------"

      stdbuf -oL tail -n 100 -F "$LOGFILE" | while read line; do
          if echo "$line" | grep -qi "DROP"; then
              REASON=$(echo "$line" | awk -F'\\[\\*\\*\\]' '{print $2}' | xargs)
              IP=$(echo "$line" | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -n 1)

              if [ -n "$IP" ]; then
                  IS_ADMIN=false
                  for admin_ip in "${EXCLUDE_IPS[@]}"; do
                      if [ "$IP" == "$admin_ip" ]; then
                          IS_ADMIN=true
                          break
                      fi
                  done

                  if [ "$IS_ADMIN" = true ]; then
                      echo "⚠️  [경고] 관리자 IP 위험 행위 감지 (차단 제외됨)"
                      echo "      => 대상: $IP"
                      echo "      => 탐지명: $REASON"  
                  elif grep -qx "$IP" "$BLOCKED_IPS"; then
                      : 
                  else
                      sudo iptables -I INPUT -s "$IP" -j DROP
                      echo "$IP" >> "$BLOCKED_IPS"
                      echo "🚫 [차단] 공격 IP: $IP"
                      echo "      => 탐지명: $REASON"  
                  fi
              fi
          fi
      done