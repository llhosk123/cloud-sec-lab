---
- name: 1. Snort 패키지 설치
  apt:
    name: snort
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: 2. [복구] 기존 꼬인 프로세스 및 파일 강제 정리
  shell: |
    pkill -9 snort || true
    rm -f /var/log/snort/*
  failed_when: false

- name: 3. 인터페이스 이름 자동 감지
  set_fact:
    ansible_interface_name: "{{ ansible_default_ipv4.interface }}"

- name: 4. Snort 기본 설정 파일(/etc/default/snort)에 인터페이스 지정
  lineinfile:
    path: /etc/default/snort
    regexp: '^INTERFACE='
    line: 'INTERFACE="{{ ansible_interface_name }}"'
  register: default_config

- name: 5. snort.conf에 alert_full 출력 설정 추가
  lineinfile:
    path: /etc/snort/snort.conf
    line: 'output alert_full: snort.alert'
    insertafter: EOF
    state: present
  register: snort_conf

- name: 6. Snort 커스텀 룰 배포 (템플릿 방식)
  template:
    src: snort.rules.j2
    dest: /etc/snort/rules/local.rules
  register: rule_update

- name: 7. Snort 룰 문법 검사
  shell: "snort -T -c /etc/snort/snort.conf"
  when: rule_update.changed or snort_conf.changed

# 💡 [여기가 핵심입니다!] Snort가 켜지기 전에 우리가 먼저 빈 파일을 만들고 주인을 snort로 도장 찍어버립니다.
- name: 8. 로그 파일 미리 생성 및 소유권 강제 고정 (Snort 자체 버그 우회)
  shell: |
    touch /var/log/snort/snort.alert
    touch /var/log/snort/snort.alert.fast
    touch /var/log/snort/snort.log
    chown -R snort:snort /var/log/snort
    chmod -R 700 /var/log/snort

- name: 9. Snort 서비스 재시작 (systemctl restart)
  systemd:
    name: snort
    state: restarted
    enabled: yes
  # 무조건 재시작하면서 권한 적용받게 임시로 when 제거 (테스트용)

- name: 10. IPS 스크립트 디렉토리 생성
  file:
    path: /home/ubuntu/ips
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: 11. ips_deny.sh 스크립트 배포
  copy:
    dest: /home/ubuntu/ips/ips_deny.sh
    owner: ubuntu
    group: ubuntu
    mode: '0755'
    content: |
      #!/bin/bash
      LOGFILE="/var/log/snort/snort.alert.fast"
      EXCLUDE_IPS=("192.168.100.20" "52.78.76.224" "192.168.110.229" "192.168.110.215" "192.168.110.40" "192.168.110.10" "192.168.100.10" "43.202.237.187" "192.168.120.10" "127.0.0.1" "124.58.76.122" "180.224.83.39" "211.243.114.16" "59.16.17.51" "218.155.95.111" "211.195.111.228" "218.147.184.245")

      echo "------------------------------------------------"
      echo "  [침입 차단 시스템 가동 중] (실시간 조회 모드)"
      echo "------------------------------------------------"

      until [ -f "$LOGFILE" ]; do sleep 1; done

      stdbuf -oL tail -n 100 -F "$LOGFILE" | while read line; do
          if echo "$line" | grep -qi "DROP"; then
              REASON=$(echo "$line" | awk -F'\\[\\*\\*\\]' '{print $2}' | xargs)
              IP=$(echo "$line" | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -n 1)

              if [ -n "$IP" ]; then
                  IS_ADMIN=false
                  for admin_ip in "${EXCLUDE_IPS[@]}"; do
                      if [ "$IP" == "$admin_ip" ]; then
                          IS_ADMIN=true
                          break
                      fi
                  done

                  if [ "$IS_ADMIN" = true ]; then
                      echo "⚠️  [제외] 관리자 IP 감지: $IP"
                  elif sudo iptables -C INPUT -s "$IP" -j DROP 2>/dev/null; then
                      echo "ℹ️  [중복] 이미 차단된 IP입니다: $IP"
                  else
                      sudo iptables -I INPUT -s "$IP" -j DROP
                      echo "🚫 [차단] 신규 공격 IP 감지: $IP"
                  fi
              fi
          fi
      done