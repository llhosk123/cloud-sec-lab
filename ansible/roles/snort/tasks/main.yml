---
- name: 1. Snort 패키지 설치
  apt:
    name: snort
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: 2. snort.conf 파일 맨 밑에 alert_full 출력 설정 추가
  lineinfile:
    path: /etc/snort/snort.conf
    line: 'output alert_full: /var/log/snort/snort.alert'
    insertafter: EOF  # 파일 맨 끝에 추가
    state: present
  register: config_updated

- name: 3. 로그 디렉토리 권한 설정 (snort:snort, 700)
  file:
    path: /var/log/snort
    state: directory
    owner: snort  # ubuntu에서 snort로 변경
    group: snort  # ubuntu에서 snort로 변경
    mode: '0700'  # 755에서 700으로 변경

- name: 4. 인터페이스 이름 자동 감지
  set_fact:
    ansible_interface_name: "{{ ansible_default_ipv4.interface }}"

- name: 5. Snort 커스텀 룰 배포
  template:
    src: snort.rules.j2
    dest: /etc/snort/rules/local.rules
  register: rule_update

- name: 6. Snort 룰 문법 검사
  shell: "snort -T -c /etc/snort/snort.conf"
  when: rule_update.changed or config_updated.changed

- name: 7. 현재 Snort 프로세스 확인
  shell: pgrep snort
  register: snort_status
  ignore_errors: yes
  changed_when: false

- name: 8. Snort 재시작 (설정/권한 변경 시 실행)
  shell: |
    pkill snort || true
    # -A fast는 snort.alert.fast를 만들고, 
    # conf의 output alert_full은 snort.alert를 만듭니다.
    nohup snort -q -A fast -c /etc/snort/snort.conf -i {{ ansible_interface_name }} -l /var/log/snort > /dev/null 2>&1 &
  when: rule_update.changed or config_updated.changed or snort_status.rc != 0

- name: 9. IPS 스크립트 디렉토리 생성
  file:
    path: /home/ubuntu/ips
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: 10. ips_deny.sh 스크립트 배포
  copy:
    dest: /home/ubuntu/ips/ips_deny.sh
    owner: ubuntu
    group: ubuntu
    mode: '0755'
    content: |
      #!/bin/bash
      # Snort가 생성하는 로그 파일 경로
      LOGFILE="/var/log/snort/snort.alert.fast"
      BLOCKED_IPS="/home/ubuntu/ips/blocked_ips.txt"
      touch "$BLOCKED_IPS"
      
      EXCLUDE_IPS=("192.168.100.20" "52.78.76.224" "127.0.0.1") # 예시 IP

      echo "[IPS 시작] 로그 모니터링 중: $LOGFILE"

      # 로그 파일이 생성될 때까지 대기 (파일이 없으면 tail 에러 방지)
      until [ -f "$LOGFILE" ]; do sleep 1; done

      stdbuf -oL tail -n 100 -F "$LOGFILE" | while read line; do
          if echo "$line" | grep -qi "DROP"; then
              REASON=$(echo "$line" | awk -F'\\[\\*\\*\\]' '{print $2}' | xargs)
              IP=$(echo "$line" | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -n 1)

              if [ -n "$IP" ]; then
                  # 관리자 IP 체크 로직 생략(위와 동일)
                  sudo iptables -I INPUT -s "$IP" -j DROP
                  echo "$IP" >> "$BLOCKED_IPS"
                  echo "🚫 차단 완료: $IP (사유: $REASON)"
              fi
          fi
      done