- name: Deploy Fluent Bit to WAF and IDS
  hosts: server, ids
  become: yes
  tasks:
    - name: Fluent Bit 공식 저장소 키 등록
      shell: |
        curl https://raw.githubusercontent.com/fluent/fluent-bit/master/install.sh | sh
      args:
        creates: /opt/fluent-bit/bin/fluent-bit

    - name: 설정 파일 배포 (주석 없는 깨끗한 버전)
      template:
        src: templates/fluent-bit.conf.j2
        dest: /etc/fluent-bit/fluent-bit.conf
      register: fb_config

    - name: 로그 파일 권한 부여 (Fluent Bit 접근용)
      file:
        path: /var/log/snort/alert
        state: touch
        mode: '0644'
      when: "'ids' in group_names"

    - name: Fluent Bit 서비스 시작 및 자동 등록
      service:
        name: fluent-bit
        state: restarted
        enabled: yes
