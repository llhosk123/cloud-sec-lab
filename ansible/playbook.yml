- hosts: server
  become: yes

  tasks:

  - name: swap off
    shell: swapoff -a

  - name: install curl
    apt:
      name: curl
      state: present
      update_cache: yes

  # -----------------
  # k3s 설치
  # -----------------

  - name: install k3s
    shell: |
      curl -sfL https://get.k3s.io | sh -

  - name: kubeconfig 권한
    shell: |
      chmod 644 /etc/rancher/k3s/k3s.yaml

  - name: kubectl 설정
    shell: |
      mkdir -p /home/ubuntu/.kube
      cp /etc/rancher/k3s/k3s.yaml /home/ubuntu/.kube/config
      chown ubuntu:ubuntu /home/ubuntu/.kube/config

  # -----------------
  # helm 설치
  # -----------------

  - name: install helm
    shell: |
      curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  # -----------------
  # ingress-nginx + WAF
  # -----------------

  - name: add ingress repo
    shell: |
      helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
      helm repo update

  - name: install ingress nginx with waf
    shell: |
      helm install ingress-nginx ingress-nginx/ingress-nginx \
        --set controller.hostNetwork=true \
        --set controller.enableModsecurity=true \
        --set controller.enableOwaspModsecurityCrs=true

  # -----------------
  # web deploy
  # -----------------

  - name: web deploy
    copy:
      src: k8s/web.yaml
      dest: /home/ubuntu/web.yaml

  - name: apply web
    shell: kubectl apply -f /home/ubuntu/web.yaml



# =========================
# IDS 서버
# =========================

- hosts: ids
  become: yes

  tasks:

  - name: apt update
    apt:
      update_cache: yes

  - name: install snort
    apt:
      name: snort
      state: present

  - name: make log dir
    file:
      path: /var/log/snort
      state: directory
      mode: 0777

  - name: run snort
    shell: |
      nohup snort -A fast -c /etc/snort/snort.conf -i ens5 -l /var/log/snort &
