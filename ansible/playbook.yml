---
- name: Infrastructure Security Setup
  hosts: all
  become: yes
  tasks:
    - name: Wait for cloud-init to finish
      shell: cloud-init status --wait
    - name: Update apt and install dependencies
      apt:
        name: [curl, git, python3-pip, unzip]
        state: present
        update_cache: yes

# Server: WAF & K3s 설치
- name: Setup WAF on Server
  hosts: server
  become: yes
  tasks:
    - name: Swap 메모리 설정 (t3.small 안정성 확보)
      shell: |
        fallocate -l 1G /swapfile || true
        chmod 600 /swapfile
        mkswap /swapfile || true
        swapon /swapfile || true

    - name: K3s 설치 (Traefik 비활성화)
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Kubeconfig 권한 설정
      shell: chmod 644 /etc/rancher/k3s/k3s.yaml

    - name: Nginx Ingress Controller 설치 (Manifest 방식)
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/baremetal/deploy.yaml

    - name: 인그레스 준비 대기
      pause:
        seconds: 30

    - name: ✅ 핵심 - Webhook 삭제 및 HostNetwork 패치
      # 80포트를 직접 사용하게 하고, 에러를 유발하는 웹훅을 제거합니다.
      shell: |
        kubectl delete ValidatingWebhookConfiguration ingress-nginx-admission || true
        kubectl patch deployment ingress-nginx-controller -n ingress-nginx --type=json \
          -p='[{"op":"add","path":"/spec/template/spec/hostNetwork","value":true}]'

    - name: WAF(ModSecurity) 설정 적용
      # ConfigMap을 통해 WAF 엔진을 활성화합니다.
      shell: |
        kubectl -n ingress-nginx patch configmap ingress-nginx-controller \
          --patch '{"data": {"enable-modsecurity": "true", "enable-owasp-modsecurity-crs": "true", "modsecurity-snippet": "SecRuleEngine On\nSecAuditEngine RelevantOnly\nSecAuditLog /var/log/modsec_audit.log"}}'

    - name: 테스트용 웹 앱 및 Ingress 배포
      shell: |
        # 1. 앱 생성
        kubectl create deployment web-test --image=nginxdemos/hello:plain-text --replicas=1 || true
        kubectl expose deployment web-test --port=80 || true
        # 2. 인그레스 설정
        cat <<EOF | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: security-test-ingress
        spec:
          ingressClassName: nginx
          rules:
          - http:
              paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: web-test
                    port:
                      number: 80
        EOF

# IDS: Snort 설치 (이전과 동일)
- name: Setup Snort IDS
  hosts: ids
  become: yes
  tasks:
    - name: Install Snort
      apt:
        name: snort
        state: present
    - name: Configure Snort local rules
      lineinfile:
        path: /etc/snort/rules/local.rules
        line: 'alert tcp any any -> $HOME_NET 80 (msg:"IDS Detection Test"; content:"attack-test"; sid:1000001; rev:1;)'
        create: yes
    - name: Start Snort Service
      shell: |
        pkill snort || true
        nohup snort -A console -q -c /etc/snort/snort.conf -i eth0 &
