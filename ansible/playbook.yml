- hosts: server
  become: true

  tasks:

  - name: install k3s
    shell: |
      curl -sfL https://get.k3s.io | sh -s - \
        --disable traefik \
        --disable servicelb

  - name: wait
    pause:
      seconds: 20

  - name: install ingress
    shell: |
      kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
