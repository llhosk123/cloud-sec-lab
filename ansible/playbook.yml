---
- name: Infrastructure Security Setup
  hosts: all
  become: yes
  tasks:
    - name: Wait for cloud-init to finish
      shell: cloud-init status --wait
    - name: Update apt and install dependencies
      apt:
        name: [curl, git, python3-pip, unzip]
        state: present
        update_cache: yes

# Server: WAF & K3s 설치 (t3.small 최적화)
- name: Setup WAF on Server
  hosts: server
  become: yes
  tasks:
    - name: Swap 메모리 설정
      shell: |
        if [ ! -f /swapfile ]; then
          fallocate -l 1G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
        fi
      args:
        creates: /swapfile

    - name: K3s 설치
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Kubeconfig 권한 설정
      file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: '0644'

    - name: Nginx Ingress Controller 및 WAF 설정 적용
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/baremetal/deploy.yaml
        sleep 20
        kubectl delete ValidatingWebhookConfiguration ingress-nginx-admission || true
        kubectl patch deployment ingress-nginx-controller -n ingress-nginx --type=json \
          -p='[{"op":"add","path":"/spec/template/spec/hostNetwork","value":true}]'
        
        kubectl -n ingress-nginx patch configmap ingress-nginx-controller \
          --patch '{"data": {"enable-modsecurity": "true", "enable-owasp-modsecurity-crs": "true", "modsecurity-snippet": "SecRuleEngine On\nSecAuditEngine RelevantOnly\nSecAuditLog /var/log/modsec_audit.log"}}'
    
  
          
# IDS: Snort 설치 및 룰 관리 자동화
- name: Setup Snort IDS
  hosts: ids
  become: yes
  tasks:
    - name: Install Snort
      apt:
        name: snort
        state: present
        update_cache: yes

    - name: 인터페이스 이름 자동 감지
      set_fact:
        ansible_interface_name: "{{ ansible_default_ipv4.interface }}"

    - name: Snort 커스텀 룰 배포 (템플릿 방식)
      template:
        src: roles/snort/templates/snort.rules.j2  
        dest: /etc/snort/rules/local.rules
      register: rule_update
    
    - name: Snort 룰 문법 검사 (오타 있으면 배포 중단)
      shell: "snort -T -c /etc/snort/snort.conf"
      when: rule_update.changed

    - name: 로그 디렉토리 권한 설정
      file:
        path: /var/log/snort
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Snort 실행/재시작
      shell: |
        pkill snort || true
        # -A fast: 파일에 로그 기록 (Kafka 전송용)
        nohup snort -q -A fast -c /etc/snort/snort.conf -i {{ ansible_interface_name }} -l /var/log/snort &
      # 룰이 바뀌었거나 프로세스가 없을 때만 실행
      when: rule_update.changed or (ansible_facts.services is not defined)
