- hosts: server
  become: yes

  tasks:

    - name: apt update
      apt:
        update_cache: yes

    - name: install curl
      apt:
        name: curl
        state: present

    - name: make swap
      shell: |
        fallocate -l 1G /swapfile || true
        chmod 600 /swapfile
        mkswap /swapfile || true
        swapon /swapfile || true

    - name: disable ufw
      shell: |
        systemctl stop ufw || true
        systemctl disable ufw || true

    - name: uninstall k3s
      shell: |
        /usr/local/bin/k3s-uninstall.sh || true

    - name: install k3s
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
      args:
        executable: /bin/bash

    - name: wait k3s
      shell: sleep 40

    - name: check nodes
      shell: sudo k3s kubectl get nodes
      register: nodes

    - debug:
        var: nodes.stdout


    # k8s dir

    - name: make k8s dir
      file:
        path: /home/ubuntu/k8s
        state: directory
        owner: ubuntu


    # copy yaml

    - name: copy web yaml
      copy:
        src: k8s/web.yaml
        dest: /home/ubuntu/k8s/web.yaml

    - name: copy svc yaml
      copy:
        src: k8s/svc.yaml
        dest: /home/ubuntu/k8s/svc.yaml

    - name: copy ingress yaml
      copy:
        src: k8s/ingress.yaml
        dest: /home/ubuntu/k8s/ingress.yaml


    # ingress install

    - name: install ingress controller
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/baremetal/deploy.yaml

    - name: wait ingress
      shell: sleep 60


    # ✅ hostNetwork 적용 → 80포트 직접 사용

    - name: patch ingress to hostNetwork
      shell: |
        kubectl patch deployment ingress-nginx-controller \
          -n ingress-nginx \
          --type=json \
          -p='[
            {"op":"add","path":"/spec/template/spec/hostNetwork","value":true},
            {"op":"add","path":"/spec/template/spec/dnsPolicy","value":"ClusterFirstWithHostNet"}
          ]'

    - name: wait ingress restart
      shell: sleep 120


    # ✅ modsecurity enable

    - name: enable modsecurity configmap
      shell: |
        kubectl -n ingress-nginx create configmap ingress-nginx-controller \
          --from-literal=enable-modsecurity=true \
          --from-literal=enable-owasp-modsecurity-crs=true \
          --from-literal=modsecurity-snippet="SecRuleEngine On" \
          -o yaml --dry-run=client | kubectl apply -f -


    # webhook 문제 방지

    - name: delete admission webhook
      shell: |
        kubectl delete ValidatingWebhookConfiguration ingress-nginx-admission || true


    # apply web

    - name: apply web
      shell: kubectl apply -f /home/ubuntu/k8s/web.yaml

    - name: apply svc
      shell: kubectl apply -f /home/ubuntu/k8s/svc.yaml

    - name: apply ingress
      shell: kubectl apply -f /home/ubuntu/k8s/ingress.yaml



# =========================
# IDS (Snort)
# =========================

- hosts: ids
  become: yes

  tasks:

    - name: apt update
      apt:
        update_cache: yes

    - name: install snort (noninteractive)
      shell: |
        DEBIAN_FRONTEND=noninteractive apt-get install -y snort

    - name: copy rules
      copy:
        src: snort/local.rules
        dest: /etc/snort/rules/local.rules

    - name: enable local rules
      lineinfile:
        path: /etc/snort/snort.conf
        regexp: '^# include \$RULE_PATH/local.rules'
        line: 'include $RULE_PATH/local.rules'

    - name: run snort
      shell: |
        pkill snort || true
        IFACE=$(ip route | grep default | awk '{print $5}')
        snort -A console -q -c /etc/snort/snort.conf -i $IFACE &
