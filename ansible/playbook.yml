- hosts: server
  become: yes

  tasks:

    - name: apt update
      apt:
        update_cache: yes

    - name: install curl
      apt:
        name: curl
        state: present

    - name: make swap
      shell: |
        fallocate -l 1G /swapfile || true
        chmod 600 /swapfile
        mkswap /swapfile || true
        swapon /swapfile || true

    - name: disable ufw
      shell: |
        systemctl stop ufw || true
        systemctl disable ufw || true

    - name: uninstall k3s
      shell: |
        /usr/local/bin/k3s-uninstall.sh || true

    - name: install k3s
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
      args:
        executable: /bin/bash

    - name: wait k3s
      shell: sleep 40

    - name: check nodes
      shell: sudo k3s kubectl get nodes
      register: nodes

    - debug:
        var: nodes.stdout


    # k8s dir

    - name: make k8s dir
      file:
        path: /home/ubuntu/k8s
        state: directory
        owner: ubuntu


    # copy yaml

    - name: copy web yaml
      copy:
        src: k8s/web.yaml
        dest: /home/ubuntu/k8s/web.yaml

    - name: copy svc yaml
      copy:
        src: k8s/svc.yaml
        dest: /home/ubuntu/k8s/svc.yaml

    - name: copy ingress yaml
      copy:
        src: k8s/ingress.yaml
        dest: /home/ubuntu/k8s/ingress.yaml


    # ingress install

    - name: install ingress controller
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/baremetal/deploy.yaml


    # wait ingress

    - name: wait ingress
      shell: sleep 120


    # ✅ modsecurity enable 추가

    - name: enable modsecurity
      shell: |
        kubectl -n ingress-nginx patch deployment ingress-nginx-controller \
        -p '{"spec":{"template":{"spec":{"containers":[{"name":"controller","args":["/nginx-ingress-controller","--enable-modsecurity","--enable-owasp-modsecurity-crs"]}]}}}}'


    # webhook 문제 방지

    - name: delete admission webhook
      shell: |
        kubectl delete ValidatingWebhookConfiguration ingress-nginx-admission || true


    # apply

    - name: apply web
      shell: kubectl apply -f /home/ubuntu/k8s/web.yaml

    - name: apply svc
      shell: kubectl apply -f /home/ubuntu/k8s/svc.yaml

    - name: apply ingress
      shell: kubectl apply -f /home/ubuntu/k8s/ingress.yaml
