# ansible/playbook.yml
---
- name: Infrastructure Security Setup
  hosts: all
  become: yes
  tasks:
    - name: Wait for cloud-init to finish
      shell: cloud-init status --wait
    - name: Update apt and install dependencies
      apt:
        name: [curl, git, python3-pip, unzip]
        state: present
        update_cache: yes

# Server: WAF & K3s 설치
- name: Setup WAF on Server
  hosts: server
  become: yes
  tasks:
    - name: Install K3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for Kubeconfig
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml

    - name: Install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Deploy Nginx Ingress with ModSecurity
      shell: |
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo update
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace ingress-nginx --create-namespace \
          --set controller.config.enable-modsecurity="true" \
          --set controller.config.enable-owasp-modsecurity-crs="true" \
          --set controller.config.modsecurity-snippet="SecRuleEngine On\nSecAuditEngine RelevantOnly\nSecAuditLog /var/log/modsec_audit.log"

# IDS: Snort 설치 및 룰 설정
- name: Setup Snort IDS
  hosts: ids
  become: yes
  tasks:
    - name: Install Snort
      apt:
        name: snort
        state: present

    - name: Configure Snort local rules (Security Test)
      lineinfile:
        path: /etc/snort/rules/local.rules
        # 테스트용: 'attack-test' 문자열이 포함된 패킷 탐지
        line: 'alert tcp any any -> $HOME_NET 80 (msg:"IDS Detection Test"; content:"attack-test"; sid:1000001; rev:1;)'
        create: yes

    - name: Start Snort Service
      shell: |
        # 인터페이스 이름은 t3.small 기준 eth0가 일반적입니다.
        nohup snort -A console -q -c /etc/snort/snort.conf -i eth0 &
