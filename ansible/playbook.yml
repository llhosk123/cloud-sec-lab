---
- name: Infrastructure Security Setup
  hosts: all
  become: yes
  tasks:
    - name: Wait for cloud-init to finish
      shell: cloud-init status --wait
    - name: Update apt and install dependencies
      apt:
        name: [curl, git, python3-pip, unzip]
        state: present
        update_cache: yes

# Server: WAF & K3s 설치 (Traefik 비활성화 버전)
- name: Setup WAF on Server
  hosts: server
  become: yes
  tasks:
    - name: Install K3s without Traefik
      # INSTALL_K3S_EXEC 옵션으로 Traefik을 아예 설치하지 않습니다.
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for Kubeconfig
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml

    - name: Install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Deploy Nginx Ingress with ModSecurity
      shell: |
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo update
        # 80/443 포트를 Nginx가 단독으로 사용합니다.
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace ingress-nginx --create-namespace \
          --set controller.config.enable-modsecurity="true" \
          --set controller.config.enable-owasp-modsecurity-crs="true" \
          --set controller.config.modsecurity-snippet="SecRuleEngine On\nSecAuditEngine RelevantOnly\nSecAuditLog /var/log/modsec_audit.log"

    - name: Deploy Test Web Application
      # 인프라만 있고 앱이 없으면 페이지가 안 뜨므로, 테스트용 앱을 즉시 띄웁니다.
      shell: |
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
        # 1. 테스트용 앱 배포
        kubectl create deployment web-test --image=nginxdemos/hello:plain-text --replicate=1 || true
        kubectl expose deployment web-test --port=80 || true
        
        # 2. WAF가 적용된 Ingress 설정 생성
        cat <<EOF | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: security-test-ingress
          annotations:
            kubernetes.io/ingress.class: nginx
            nginx.ingress.kubernetes.io/enable-modsecurity: "true"
        spec:
          rules:
          - http:
              paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: web-test
                    port:
                      number: 80
        EOF

# IDS: Snort 설치 및 룰 설정
- name: Setup Snort IDS
  hosts: ids
  become: yes
  tasks:
    - name: Install Snort
      apt:
        name: snort
        state: present

    - name: Configure Snort local rules
      lineinfile:
        path: /etc/snort/rules/local.rules
        line: 'alert tcp any any -> $HOME_NET 80 (msg:"IDS Detection Test"; content:"attack-test"; sid:1000001; rev:1;)'
        create: yes

    - name: Start Snort Service
      # Snort가 이미 돌고 있을 수 있으므로 pkill 후 재실행
      shell: |
        pkill snort || true
        nohup snort -A console -q -c /etc/snort/snort.conf -i eth0 &
