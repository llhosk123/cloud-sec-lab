- name: Setup Kafka Broker
  hosts: kafka
  become: yes
  tasks:
    - name: Install Docker & Docker-Compose
      apt:
        name: [docker.io, docker-compose]
        state: present
        update_cache: yes

    - name: Create Kafka Directory
      file:
        path: /home/ubuntu/kafka
        state: directory

    - name: Deploy Docker-Compose for Kafka
      copy:
        dest: /home/ubuntu/kafka/docker-compose.yml
        content: |
          version: '3'
          services:
            zookeeper:
              # Bitnami가 아닌 Apache 공식 이미지를 사용합니다.
              image: zookeeper:latest
              ports:
                - "2181:2181"

            kafka:
              # 가장 안정적인 wurstmeister 이미지를 사용합니다.
              image: wurstmeister/kafka:latest
              ports:
                - "9092:9092"
              environment:
                # 중요: Bitnami와 설정 변수명이 다릅니다!
                KAFKA_ADVERTISED_HOST_NAME: {{ ansible_host }}
                KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
                KAFKA_ADVERTISED_PORT: 9092
                KAFKA_LOG_DIRS: /kafka/logs
                # 테스트 편의를 위해 토픽 자동 생성 활성화
                KAFKA_CREATE_TOPICS: "snort-logs:1:1"
              depends_on:
                - zookeeper

    - name: Start Kafka Services
      shell: docker-compose up -d
      args:
        chdir: /home/ubuntu/kafka
